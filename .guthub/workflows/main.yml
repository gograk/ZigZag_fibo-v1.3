name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      archs:
        description: "CPU arch (arm64-v8a | arm64-v8a,armeabi-v7a)"
        required: false
        default: "arm64-v8a"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      # Bump ini untuk force-invalidate semua cache
      CACHE_VER: v9
      # System SDK path (sudah ada di GitHub runner, tidak perlu download)
      ANDROID_SDK:  /usr/local/lib/android/sdk
      ANDROID_NDK:  /usr/local/lib/android/sdk/ndk/27.3.13750724

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Python 3.11 ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Sistem packages ──────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache lld \
            --no-install-recommends

      # ── 5. Siapkan system SDK (build-tools + lisensi) ───────────────────────
      # FIX: Buildozer kelola SDK-nya sendiri di ~/.buildozer, tapi
      # sdkmanager-nya gagal install build-tools (silent fail).
      # Solusi: paksa buildozer pakai SYSTEM SDK via env var ANDROIDSDK + ANDROIDNDK.
      # System SDK sudah ada di /usr/local/lib/android/sdk dengan build-tools,
      # platform-tools, dan NDK 27.3 (tidak perlu download apapun).
      - name: Prepare system SDK (accept licenses + verify build-tools)
        run: |
          SDKMAN="${{ env.ANDROID_SDK }}/cmdline-tools/latest/bin/sdkmanager"

          # Terima semua lisensi
          yes | "$SDKMAN" --licenses 2>/dev/null || true

          # Verifikasi atau install build-tools 34.0.0 jika belum ada
          if [ ! -d "${{ env.ANDROID_SDK }}/build-tools/34.0.0" ]; then
            echo "Installing build-tools;34.0.0 ..."
            "$SDKMAN" "build-tools;34.0.0"
          else
            echo "build-tools 34.0.0 sudah ada."
          fi

          # Verifikasi NDK 27.3 tersedia
          echo "=== NDK tersedia ==="
          ls "${{ env.ANDROID_SDK }}/ndk/" 2>/dev/null || echo "Folder ndk kosong"

          # Pastikan platforms android-33 tersedia
          if [ ! -d "${{ env.ANDROID_SDK }}/platforms/android-33" ]; then
            echo "Installing platforms;android-33 ..."
            "$SDKMAN" "platforms;android-33"
          else
            echo "platforms android-33 sudah ada."
          fi

      # ── 6. Cache ~/.buildozer (p4a build artifacts) ─────────────────────────
      # Cache hanya untuk p4a compilation artifacts (Python, SDL2, dll).
      # SDK/NDK tidak di-cache karena sekarang pakai system SDK.
      - name: Cache buildozer home
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py', 'bot_core.py') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-
            ${{ env.CACHE_VER }}-buildozer-

      # ── 7. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-

      # ── 8. Cache ccache ─────────────────────────────────────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-arm64
          restore-keys: |
            ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-

      # ── 9. Setup ccache ────────────────────────────────────────────────────
      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      # ── 10. Install buildozer & cython ──────────────────────────────────────
      # cython<3.0 wajib — Cython 3.x tidak kompatibel dengan kivy/p4a
      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip --quiet
          pip install "buildozer" "cython<3.0" --quiet
          buildozer --version
          python -c "import Cython; print('Cython', Cython.__version__)"

      # ── 11. Patch archs (workflow_dispatch) ─────────────────────────────────
      - name: Patch archs (workflow_dispatch override)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARCHS="${{ github.event.inputs.archs }}"
          sed -i "s|^android.archs =.*|android.archs = $ARCHS|" buildozer.spec
          echo "Menggunakan archs: $ARCHS"

      # ── 12. BUILD APK ───────────────────────────────────────────────────────
      # KUNCI FIX: Set ANDROIDSDK dan ANDROIDNDK ke system path.
      # Buildozer baca kedua env var ini dan TIDAK download SDK/NDK sendiri.
      # System SDK sudah punya build-tools, platform-tools, NDK 27.3 — siap pakai.
      - name: Build APK (debug)
        env:
          ANDROIDSDK:  ${{ env.ANDROID_SDK }}
          ANDROIDNDK:  ${{ env.ANDROID_NDK }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx2g"
        run: |
          echo "SDK: $ANDROIDSDK"
          echo "NDK: $ANDROIDNDK"
          ls "$ANDROIDSDK/build-tools/" 2>/dev/null || echo "WARNING: build-tools tidak ditemukan!"
          buildozer -v android debug 2>&1 | tee build.log

      # ── 13. ccache stats ────────────────────────────────────────────────────
      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # ── 14. Ringkasan build ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "=== File APK ==="
          find . -name "*.apk" 2>/dev/null | head -20 || echo "Tidak ada APK"
          echo ""
          echo "=== 60 baris terakhir build.log ==="
          tail -60 build.log 2>/dev/null || echo "build.log tidak ditemukan"

      # ── 15. Upload APK ──────────────────────────────────────────────────────
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK-${{ github.run_number }}
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 16. Upload full build log (SELALU) ──────────────────────────────────
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
