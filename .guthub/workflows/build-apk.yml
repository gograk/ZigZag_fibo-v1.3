name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      archs:
        description: "CPU arch (arm64-v8a | arm64-v8a,armeabi-v7a)"
        required: false
        default: "arm64-v8a"

# ─────────────────────────────────────────────────────────────────────────────
#  STRATEGY: cache terberat di-preload SEBELUM buildozer berjalan.
#  Urutan optimasi:
#    1) Cache seluruh ~/.buildozer  (NDK, SDK, python-for-android)
#    2) Cache ~/.gradle             (Gradle wrapper + deps)
#    3) Cache ccache                (kompilasi C/C++ incremental)
#    4) SDK sudah di-install via cache; buildozer TIDAK download ulang.
#    5) Hanya arm64-v8a (1 ABI) → build 2× lebih cepat vs dual-ABI.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      SDK_DIR:  ${{ github.workspace }}/.buildozer/android/platform/android-sdk
      NDK_VER:  25.1.8937393
      # Ubah string ini jika mau force-invalidate semua cache sekaligus
      CACHE_VER: v3

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 (pre-built binary, cepat) ───────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Python 3.11 ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Sistem packages (minimal, cepat) ────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache lld \
            --no-install-recommends

      # ── 5. Cache buildozer (KUNCI: hash semua file sumber) ─────────────────
      - name: Cache buildozer global dir
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-py311-${{ hashFiles('buildozer.spec', 'requirements.txt', 'main.py', 'bot_core.py') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-py311-
            ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-

      # ── 6. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-

      # ── 7. Cache ccache (kompilasi C/C++ incremental) ──────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-arm64
          restore-keys: |
            ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-

      # ── 8. Setup ccache ────────────────────────────────────────────────────
      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      # ── 9. Pre-install Android SDK (skip download buildozer yg lambat) ─────
      - name: Setup Android SDK + NDK
        if: steps.cache-buildozer.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ env.SDK_DIR }}/cmdline-tools"

          # Download Command-line tools
          wget -q \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools "${{ env.SDK_DIR }}/cmdline-tools/latest"

          SDKMAN="${{ env.SDK_DIR }}/cmdline-tools/latest/bin/sdkmanager"

          # Terima semua lisensi
          yes | "$SDKMAN" --sdk_root="${{ env.SDK_DIR }}" --licenses 2>/dev/null || true

          # Install paket yang dibutuhkan buildozer
          "$SDKMAN" --sdk_root="${{ env.SDK_DIR }}" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "ndk;${{ env.NDK_VER }}"

          # Symlink legacy (buildozer masih cari di tools/bin/)
          mkdir -p "${{ env.SDK_DIR }}/tools/bin"
          ln -sf "${{ env.SDK_DIR }}/cmdline-tools/latest/bin/sdkmanager" \
                 "${{ env.SDK_DIR }}/tools/bin/sdkmanager"
          ln -sf "${{ env.SDK_DIR }}/cmdline-tools/latest/bin/avdmanager" \
                 "${{ env.SDK_DIR }}/tools/bin/avdmanager"

          echo "SDK setup selesai:"
          ls "${{ env.SDK_DIR }}/tools/bin/"

      # ── 10. Re-symlink jika SDK dari cache (path bisa berbeda) ─────────────
      - name: Restore SDK symlinks
        if: steps.cache-buildozer.outputs.cache-hit == 'true'
        run: |
          mkdir -p "${{ env.SDK_DIR }}/tools/bin"
          ln -sf "${{ env.SDK_DIR }}/cmdline-tools/latest/bin/sdkmanager" \
                 "${{ env.SDK_DIR }}/tools/bin/sdkmanager" 2>/dev/null || true
          ln -sf "${{ env.SDK_DIR }}/cmdline-tools/latest/bin/avdmanager" \
                 "${{ env.SDK_DIR }}/tools/bin/avdmanager" 2>/dev/null || true

      # ── 11. Install buildozer + cython ─────────────────────────────────────
      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip --quiet
          pip install buildozer cython --quiet

      # ── 12. Patch buildozer.spec arch jika pakai workflow_dispatch ──────────
      - name: Patch archs (workflow_dispatch override)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARCHS="${{ github.event.inputs.archs }}"
          sed -i "s|^android.archs =.*|android.archs = $ARCHS|" buildozer.spec
          echo "Menggunakan archs: $ARCHS"

      # ── 13. BUILD APK ───────────────────────────────────────────────────────
      - name: Build APK (debug)
        run: |
          export ANDROID_SDK_ROOT="${{ env.SDK_DIR }}"
          export ANDROID_NDK_HOME="${{ env.SDK_DIR }}/ndk/${{ env.NDK_VER }}"
          export GRADLE_OPTS="-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx2g"
          buildozer -v android debug 2>&1 | tee build.log

      # ── 14. Tampilkan ccache stats ─────────────────────────────────────────
      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # ── 15. Tampilkan ringkasan build ──────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "=== File APK ==="
          ls -lh bin/*.apk 2>/dev/null || echo "APK tidak ditemukan"
          echo ""
          echo "=== 30 baris terakhir build.log ==="
          tail -30 build.log 2>/dev/null || true

      # ── 16. Upload APK sebagai artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK-${{ github.run_number }}
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 17. Upload build log jika gagal ────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
