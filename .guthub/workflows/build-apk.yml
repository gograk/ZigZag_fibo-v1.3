name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      archs:
        description: "CPU arch (arm64-v8a | arm64-v8a,armeabi-v7a)"
        required: false
        default: "arm64-v8a"

# ─────────────────────────────────────────────────────────────────────────────
#  FIX HISTORY:
#    v4 → v5: Hapus SDK pre-install step (konflik path dengan ~/.buildozer).
#             Hapus ANDROID_SDK_ROOT/ANDROID_NDK_HOME override di build step
#             (buildozer kelola NDK-nya sendiri di ~/.buildozer, jangan override).
#             Hapus python3==x.x.x pin di buildozer.spec (p4a gagal resolve).
#             Upload full build log selalu (bukan hanya saat gagal).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      # Ganti string ini untuk force-invalidate semua cache sekaligus
      CACHE_VER: v5

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Python 3.11 ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Sistem packages ──────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache lld \
            --no-install-recommends

      # ── 5. Cache ~/.buildozer (NDK r25b + SDK + python-for-android) ─────────
      #  PENTING: jangan override ANDROID_SDK_ROOT/ANDROID_NDK_HOME ke path lain.
      #  Biarkan buildozer pakai ~/.buildozer sehingga cache ini valid.
      - name: Cache buildozer home
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py', 'bot_core.py') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-
            ${{ env.CACHE_VER }}-buildozer-

      # ── 6. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-

      # ── 7. Cache ccache (kompilasi C/C++ incremental) ──────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-arm64
          restore-keys: |
            ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-

      # ── 8. Setup ccache ────────────────────────────────────────────────────
      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      # ── 9. Install buildozer & cython ───────────────────────────────────────
      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip --quiet
          pip install buildozer cython --quiet
          buildozer --version

      # ── 10. Patch archs jika pakai workflow_dispatch ────────────────────────
      - name: Patch archs (workflow_dispatch override)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARCHS="${{ github.event.inputs.archs }}"
          sed -i "s|^android.archs =.*|android.archs = $ARCHS|" buildozer.spec
          echo "Menggunakan archs: $ARCHS"

      # ── 11. BUILD APK ───────────────────────────────────────────────────────
      #  JANGAN set ANDROID_SDK_ROOT / ANDROID_NDK_HOME di sini.
      #  Buildozer mengelola path NDK/SDK-nya sendiri di ~/.buildozer.
      #  Override ke path lain menyebabkan konflik dan build gagal.
      - name: Build APK (debug)
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx2g"
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── 12. ccache stats ────────────────────────────────────────────────────
      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # ── 13. Ringkasan build ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "=== File APK di bin/ ==="
          find . -name "*.apk" 2>/dev/null | head -20 || echo "Tidak ada APK"
          echo ""
          echo "=== 60 baris terakhir build.log ==="
          tail -60 build.log 2>/dev/null || echo "build.log tidak ditemukan"

      # ── 14. Upload APK ──────────────────────────────────────────────────────
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK-${{ github.run_number }}
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 15. Upload build log (SELALU, bukan hanya saat gagal) ───────────────
      #  Log lengkap perlu diupload agar error di p4a bisa dilihat.
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
