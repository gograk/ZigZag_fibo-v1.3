name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      archs:
        description: "CPU arch (arm64-v8a | arm64-v8a,armeabi-v7a)"
        required: false
        default: "arm64-v8a"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      # Bump ini untuk force-invalidate semua cache
      CACHE_VER: v12
      # System SDK path (sudah ada di GitHub runner, tidak perlu download)
      ANDROID_SDK:  /usr/local/lib/android/sdk
      ANDROID_NDK:  /usr/local/lib/android/sdk/ndk/27.3.13750724

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Python 3.11 ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Sistem packages ──────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache lld \
            --no-install-recommends

      # ── 5a. Symlink sdkmanager ke path lama ────────────────────────────────
      # Buildozer mencari sdkmanager di <sdk>/tools/bin/sdkmanager (path lama),
      # tapi SDK modern menaruhnya di cmdline-tools/latest/bin/sdkmanager.
      # Buat symlink agar buildozer menemukannya.
      - name: Symlink sdkmanager to legacy path
        run: |
          mkdir -p "${{ env.ANDROID_SDK }}/tools/bin"
          ln -sf "${{ env.ANDROID_SDK }}/cmdline-tools/latest/bin/sdkmanager" \
                 "${{ env.ANDROID_SDK }}/tools/bin/sdkmanager"
          ln -sf "${{ env.ANDROID_SDK }}/cmdline-tools/latest/bin/avdmanager" \
                 "${{ env.ANDROID_SDK }}/tools/bin/avdmanager" 2>/dev/null || true
          echo "Symlink OK: $(ls -la ${{ env.ANDROID_SDK }}/tools/bin/)"

      # ── 5b. Siapkan system SDK (build-tools + lisensi) ──────────────────────
      - name: Prepare system SDK (accept licenses + verify build-tools)
        run: |
          SDKMAN="${{ env.ANDROID_SDK }}/cmdline-tools/latest/bin/sdkmanager"

          # Terima semua lisensi
          yes | "$SDKMAN" --licenses 2>/dev/null || true

          # Verifikasi atau install build-tools 34.0.0 jika belum ada
          if [ ! -d "${{ env.ANDROID_SDK }}/build-tools/34.0.0" ]; then
            echo "Installing build-tools;34.0.0 ..."
            "$SDKMAN" "build-tools;34.0.0"
          else
            echo "build-tools 34.0.0 sudah ada."
          fi

          # Verifikasi NDK 27.3 tersedia
          echo "=== NDK tersedia ==="
          ls "${{ env.ANDROID_SDK }}/ndk/" 2>/dev/null || echo "Folder ndk kosong"

          # Pastikan platforms android-33 tersedia
          if [ ! -d "${{ env.ANDROID_SDK }}/platforms/android-33" ]; then
            echo "Installing platforms;android-33 ..."
            "$SDKMAN" "platforms;android-33"
          else
            echo "platforms android-33 sudah ada."
          fi

      # ── 6. Cache ~/.buildozer (p4a build artifacts) ─────────────────────────
      # Cache hanya untuk p4a compilation artifacts (Python, SDL2, dll).
      # SDK/NDK tidak di-cache karena sekarang pakai system SDK.
      - name: Cache buildozer home
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py', 'bot_core.py') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-buildozer-${{ runner.os }}-
            ${{ env.CACHE_VER }}-buildozer-

      # ── 7. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ env.CACHE_VER }}-gradle-${{ runner.os }}-

      # ── 8. Cache ccache ─────────────────────────────────────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-arm64
          restore-keys: |
            ${{ env.CACHE_VER }}-ccache-${{ runner.os }}-

      # ── 9. Setup ccache ────────────────────────────────────────────────────
      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      # ── 10. Install buildozer & cython ──────────────────────────────────────
      # cython<3.0 wajib — Cython 3.x tidak kompatibel dengan kivy/p4a
      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip --quiet
          pip install "buildozer" "cython<3.0" --quiet
          buildozer --version
          python -c "import Cython; print('Cython', Cython.__version__)"

      # ── 11. Patch archs (workflow_dispatch) ─────────────────────────────────
      - name: Patch archs (workflow_dispatch override)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARCHS="${{ github.event.inputs.archs }}"
          sed -i "s|^android.archs =.*|android.archs = $ARCHS|" buildozer.spec
          echo "Menggunakan archs: $ARCHS"

      # ── 12. BUILD APK ───────────────────────────────────────────────────────
      # Buildozer dijalankan dengan || true agar workflow tidak langsung stop
      # jika Gradle gagal (semua kompilasi Python/Kivy sudah OK di tahap ini).
      # Setelah buildozer, skrip memeriksa build.gradle yang di-generate p4a:
      # - Jika ada "implementation ''" (string kosong) — Gradle 8.x error —
      #   baris itu dihapus dan gradlew dijalankan ulang secara manual.
      # - Jika buildozer gagal SEBELUM tahap Gradle, exit dengan error.
      - name: Build APK (debug)
        env:
          ANDROIDSDK:  ${{ env.ANDROID_SDK }}
          ANDROIDNDK:  ${{ env.ANDROID_NDK }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx2g"
        run: |
          echo "SDK: $ANDROIDSDK"
          echo "NDK: $ANDROIDNDK"
          ls "$ANDROIDSDK/build-tools/" 2>/dev/null || echo "WARNING: build-tools tidak ditemukan!"

          # Jalankan buildozer — boleh gagal di Gradle, jangan exit dulu
          buildozer -v android debug 2>&1 | tee build.log && BUILD_OK=1 || BUILD_OK=0

          DIST_DIR=".buildozer/android/platform/build-arm64-v8a/dists/zigzagfibo"
          BUILD_GRADLE="$DIST_DIR/build.gradle"

          if [ "$BUILD_OK" = "1" ]; then
            echo "=== buildozer SUKSES — APK sudah di bin/ ==="
          elif [ -f "$BUILD_GRADLE" ]; then
            echo "=== buildozer GAGAL di Gradle — patch build.gradle dan retry ==="
            echo "--- build.gradle sebelum patch (sekitar implementation) ---"
            grep -n "implementation" "$BUILD_GRADLE" || true

            # Hapus baris 'implementation ''' (string kosong) — p4a bug + Gradle 8.x strict
            sed -i "/^\s*implementation\s*''\s*$/d" "$BUILD_GRADLE"
            # Juga hapus format dengan double-quote kosong
            sed -i '/^\s*implementation\s*""\s*$/d' "$BUILD_GRADLE"

            echo "--- build.gradle setelah patch ---"
            grep -n "implementation" "$BUILD_GRADLE" || true

            echo "=== Re-running gradlew ==="
            cd "$DIST_DIR"
            chmod +x gradlew
            ./gradlew clean assembleDebug 2>&1 | tee -a $GITHUB_WORKSPACE/build.log
            GRADLE_EXIT=${PIPESTATUS[0]}
            cd $GITHUB_WORKSPACE

            # Kumpulkan APK ke bin/
            mkdir -p bin
            find "$DIST_DIR" -name "*.apk" -exec cp {} bin/ \; 2>/dev/null || true

            if [ "$GRADLE_EXIT" != "0" ]; then
              echo "=== gradlew masih GAGAL setelah patch ==="
              exit 1
            fi
          else
            echo "=== buildozer GAGAL sebelum tahap Gradle (build.gradle belum dibuat) ==="
            echo "=== Cek log di atas untuk error kompilasi ==="
            exit 1
          fi

      # ── 13. ccache stats ────────────────────────────────────────────────────
      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # ── 14. Ringkasan build ─────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "=== File APK ==="
          find . -name "*.apk" 2>/dev/null | head -20 || echo "Tidak ada APK"
          echo ""
          echo "=== 60 baris terakhir build.log ==="
          tail -60 build.log 2>/dev/null || echo "build.log tidak ditemukan"

      # ── 15. Upload APK ──────────────────────────────────────────────────────
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK-${{ github.run_number }}
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 16. Upload full build log (SELALU) ──────────────────────────────────
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
